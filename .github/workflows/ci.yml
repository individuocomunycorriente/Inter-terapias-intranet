name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # prisma generate solo valida el schema y genera tipos, no se conecta a la base de
      # datos, pero exige que DATABASE_URL exista (mismo truco que usa el Dockerfile).
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Generar cliente de Prisma
        run: npx prisma generate
      - name: Verificar tipos
        run: npx tsc --noEmit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: https://ci-placeholder.invalid/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Verificar tipos
        run: npx tsc -b
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
